<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Coordinator Dashboard</title>
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-frame">
        <nav class="top-navbar">
            <div class="nav-left">
                <div class="logo-box">R</div>
                <div class="nav-title-group">
                    <span class="nav-title">RescueBOT Support</span>
                    <span class="nav-subtitle">Field Coordination</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="status-pill">
                    <div class="status-dot active" id="mqtt-dot"></div>
                    <span id="mqtt-status-text">NETWORK SECURE</span>
                </div>
            </div>

            <div class="nav-right">
                <button id="theme-toggle" class="btn-standard" title="Toggle Theme"><i data-lucide="sun"></i></button>
                <a href="../dashboard/dashboard.html" class="nav-link active" title="Dashboard"><i data-lucide="layout-grid"></i></a>
                <a href="../map/map.html" class="nav-link" title="Map"><i data-lucide="map"></i></a>
                <a href="../camera/camera.html" class="nav-link" title="Vision"><i data-lucide="video"></i></a>
                <a href="../sensors/sensors.html" class="nav-link" title="Telemetry"><i data-lucide="activity"></i></a>
            </div>
        </nav>

        <main class="workspace">
            <div class="dashboard-grid">
                <header class="dash-header">
                    <div class="header-content">
                        <h1>Operational Overview</h1>
                        <p>Real-time data synchronization with active rescue units.</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-standard primary"><i data-lucide="plus"></i> New Incident</button>
                    </div>
                </header>

                <div class="top-row-grid">
                    <section class="card-standard map-card">
                        <div id="mini-map" style="width: 100%; height: 100%;"></div>
                    </section>

                    <section class="card-standard feed-card">
                        <div class="feed-header">Primary Vision Node</div>
                        <div class="feed-content-area">
                            <div class="status-overlay" id="mini-cam-status">
                                <i data-lucide="video-off"></i>
                                <span>Establishing Neural Link...</span>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="stats-row">
                    <div class="card-standard stat-item">
                        <div class="icon-box"><i data-lucide="thermometer"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Environment Temp</span>
                            <span class="stat-value" id="val-temp">--.-°C</span>
                        </div>
                    </div>
                    <div class="card-standard stat-item">
                        <div class="icon-box"><i data-lucide="wind"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Gas Level</span>
                            <span class="stat-value" id="val-gas">--- ppm</span>
                        </div>
                    </div>
                    <div class="card-standard stat-item">
                        <div class="icon-box"><i data-lucide="activity"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Vibration</span>
                            <span class="stat-value" id="val-vib">-.-- m/s²</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script type="module" src="../shared/mqtt-client.js"></script>
    <script type="module" src="../shared/shared.js"></script>
    <script type="module" src="./dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
