<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Vision Node</title>
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./camera.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-frame">
        <nav class="top-navbar">
            <div class="nav-left">
                <div class="logo-box">R</div>
                <div class="nav-title-group">
                    <span class="nav-title">RescueBOT Support</span>
                    <span class="nav-subtitle">Vision Array</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="status-pill">
                    <div class="status-dot active" id="mqtt-dot"></div>
                    <span id="mqtt-status-text">NETWORK SECURE</span>
                </div>
            </div>

            <div class="nav-right">
                <button id="theme-toggle" class="btn-standard" title="Toggle Theme"><i data-lucide="sun"></i></button>
                <a href="../dashboard/dashboard.html" class="nav-link" title="Dashboard"><i data-lucide="layout-grid"></i></a>
                <a href="../map/map.html" class="nav-link" title="Map"><i data-lucide="map"></i></a>
                <a href="../camera/camera.html" class="nav-link active" title="Vision"><i data-lucide="video"></i></a>
                <a href="../sensors/sensors.html" class="nav-link" title="Telemetry"><i data-lucide="activity"></i></a>
            </div>
        </nav>

        <main class="workspace">
            <div class="camera-grid">
                <section class="card-standard main-view-card">
                    <div class="view-header">
                        <h2>PRIMARY FIELD FEED</h2>
                        <span class="status-pill">LIVE</span>
                    </div>
                    <div class="video-view-area">
                        <img id="esp32-stream" src="" alt="Stream" style="display: none; width: 100%; height: 100%; object-fit: contain;">
                        <div class="status-overlay" id="stream-placeholder">
                            <i data-lucide="video-off"></i>
                            <span>WAITING FOR FIELD SIGNAL...</span>
                        </div>
                    </div>
                    <div class="control-bar">
                        <button class="btn-standard" id="btn-stream-toggle"><i data-lucide="play"></i> Start Stream</button>
                        <button class="btn-standard"><i data-lucide="camera"></i> Capture</button>
                    </div>
                </section>

                <aside class="sidebar-content">
                    <div class="card-standard log-panel">
                        <div class="log-title">Detection History</div>
                        <div class="log-entries" id="cam-event-logs">
                            <!-- Logs here -->
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script type="module" src="../shared/mqtt-client.js"></script>
    <script type="module" src="../shared/shared.js"></script>
    <script type="module" src="./camera.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
