<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Intel | Incident Map</title>
    <meta name="description" content="Live GPS tracking and incident mapping with waypoints, hazard zones and mission telemetry.">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('rescuebot-theme') || 'dark');</script>
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app-shell">

    <!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-mark">
                <img src="../assets/logo.png" alt="Rescue Intel">
            </div>
            <div class="logo-text">
                <span class="logo-name">Rescue Intel</span>
                <span class="logo-ver">Emergency Monitoring</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Operations</div>
            <a href="../dashboard/dashboard.html" class="nav-item" data-tooltip="Overview">
                <i data-lucide="layout-dashboard"></i>
                <span class="nav-label">Overview</span>
            </a>
            <a href="../camera/camera.html" class="nav-item" data-tooltip="Live Monitoring">
                <i data-lucide="video"></i>
                <span class="nav-label">Live Monitoring</span>
            </a>
            <a href="./map.html" class="nav-item active" data-tooltip="Incident Map">
                <i data-lucide="map"></i>
                <span class="nav-label">Incident Map</span>
            </a>
            <a href="../sensors/sensors.html" class="nav-item" data-tooltip="Field Sensors">
                <i data-lucide="activity"></i>
                <span class="nav-label">Field Sensors</span>
            </a>
            <a href="../alerts/alerts.html" class="nav-item" data-tooltip="Alert Center">
                <i data-lucide="bell-ring"></i>
                <span class="nav-label">Alert Center</span>
                <span class="nav-badge" id="sidebar-alert-count">0</span>
            </a>

            <div class="nav-section-label" style="margin-top:8px;">System</div>
            <a href="../" class="nav-item" data-tooltip="Home">
                <i data-lucide="home"></i>
                <span class="nav-label">Home</span>
            </a>
            <a href="#" class="nav-item" aria-disabled="true" data-tooltip="Settings" style="opacity:0.3;cursor:not-allowed;pointer-events:none;">
                <i data-lucide="settings"></i>
                <span class="nav-label">Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="status-pill" style="width:100%; justify-content:center;">
                <div class="status-dot mqtt-status-dot standby" id="mqtt-dot"></div>
                <span class="mqtt-status-text" id="mqtt-status-text" style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.04em;">CONNECTING</span>
            </div>
        </div>
    </aside>

    <!-- ══ MAIN COLUMN ══════════════════════════════════════════ -->
    <div class="main-column">

        <!-- TOP NAVBAR -->
        <header class="top-navbar">
            <div class="nav-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open navigation">
                    <i data-lucide="menu"></i>
                </button>
                <span class="nav-page-title">Incident Map</span>
                <span class="nav-breadcrumb">/ GPS Tracking</span>
            </div>
            <div class="nav-right">
                <div class="status-pill">
                    <div class="status-dot" id="gps-dot"></div>
                    <span id="gps-status" style="font-family:var(--font-mono);font-size:10px;">3D GPS Fix</span>
                </div>
                <div class="status-pill">
                    <i data-lucide="clock" style="width:10px;height:10px;"></i>
                    <span id="mission-clock" style="font-family:var(--font-mono);font-size:10px;">--:--:--</span>
                </div>
                <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <i data-lucide="moon"></i>
                </button>
            </div>
        </header>

        <!-- MAP SHELL -->
        <div class="map-shell">

            <!-- ── MAP AREA (FULL SCREEN) ────────────────────────────── -->
            <div class="map-main-area">

                <!-- Leaflet Map -->
                <div id="map-canvas"></div>

                <!-- Floating Tactical Tools HUD -->
                <div class="map-hud-overlay map-floating-tools">
                    <div class="map-tools-title" style="margin-bottom: 8px; font-size: 10px; font-weight: 600; text-align: center; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase;">Tools</div>
                    <div class="map-tools-grid">
                        <button class="map-tool-btn active" id="btn-follow" title="Follow Rover">
                            <i data-lucide="crosshair"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-safe" title="Safe Zone">
                            <i data-lucide="shield"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-danger" title="Danger Zone">
                            <i data-lucide="alert-triangle"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-base-station" title="Base Station">
                            <i data-lucide="radio"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-survivor" title="Survivor (SOS)">
                            <i data-lucide="heart"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-obstacle" title="Obstacle">
                            <i data-lucide="construction"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-supplies" title="Supplies">
                            <i data-lucide="package"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-fire" title="Fire Source">
                            <i data-lucide="flame"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-gas" title="Gas Hazard">
                            <i data-lucide="skull"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-water" title="Water Hazard">
                            <i data-lucide="droplet"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-camera" title="Photo Point">
                            <i data-lucide="camera"></i>
                        </button>
                        <button class="map-tool-btn" id="btn-clear-path" title="Clear Path">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </div>

                <!-- Floating GPS Telemetry Box (Top Center) -->
                <div class="map-hud-overlay map-hud-top map-floating-coords">
                    <span class="gps-pulse-dot"></span>
                    <span class="coord-group">
                        <span class="coord-label">LAT</span>
                        <span id="lat-display" class="coord-value">0.000000°</span>
                    </span>
                    <span class="coord-divider">|</span>
                    <span class="coord-group">
                        <span class="coord-label">LNG</span>
                        <span id="lng-display" class="coord-value">0.000000°</span>
                    </span>
                </div>

                <!-- HUD Bottom: Stats Cards -->
                <div class="map-hud-overlay map-hud-bottom">
                    <div class="map-hud-card">
                        <div class="hud-card-val" id="lat-hud">--</div>
                        <div class="hud-card-lbl">Latitude</div>
                    </div>
                    <div class="map-hud-card">
                        <div class="hud-card-val" id="lng-hud">--</div>
                        <div class="hud-card-lbl">Longitude</div>
                    </div>
                    <div class="map-hud-card">
                        <div class="hud-card-val" id="mission-timer-hud">00:00:00</div>
                        <div class="hud-card-lbl">Mission Time</div>
                    </div>
                </div>

                <!-- Right Controls: Zoom / Recenter -->
                <div class="map-tools-right">
                    <button class="map-zoom-btn" id="btn-zoom-in" title="Zoom In">
                        <i data-lucide="plus"></i>
                    </button>
                    <button class="map-zoom-btn" id="btn-zoom-out" title="Zoom Out">
                        <i data-lucide="minus"></i>
                    </button>
                    <div class="map-zoom-divider"></div>
                    <button class="map-zoom-btn" id="btn-recenter" title="Recenter on Rover">
                        <i data-lucide="crosshair"></i>
                    </button>
                    <button class="map-zoom-btn" id="btn-layers" title="Toggle Layer">
                        <i data-lucide="layers"></i>
                    </button>
                </div>

            </div>

        </div>

    </div>
    <!-- end .main-column -->

</div>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module" src="../shared/mqtt-client.js"></script>
<script type="module" src="../shared/shared.js"></script>
<script type="module" src="./map.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
