<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Tactical Mapping</title>
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-frame">
        <!-- TOP NAVBAR -->
        <nav class="top-navbar">
            <div class="nav-left">
                <div class="logo-box">R</div>
                <div class="nav-title-group">
                    <span class="nav-title">RescueBOT Support</span>
                    <span class="nav-subtitle">Tactical Field Positioning</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="status-pill">
                    <div class="status-dot active" id="mqtt-dot"></div>
                    <span id="mqtt-status-text">NETWORK SECURE</span>
                </div>
                <div class="status-pill">
                    <i data-lucide="clock" style="width: 14px;"></i>
                    <span id="current-time">00:00:00</span>
                </div>
            </div>

            <div class="nav-right">
                <button id="theme-toggle" class="theme-toggle" title="Toggle Theme"><i data-lucide="sun"></i></button>
                <a href="../dashboard/dashboard.html" class="nav-link" title="Dashboard">
                    <i data-lucide="layout-grid"></i>
                </a>
                <a href="../map/map.html" class="nav-link active" title="Map">
                    <i data-lucide="map"></i>
                </a>
                <a href="../camera/camera.html" class="nav-link" title="Vision">
                    <i data-lucide="video"></i>
                </a>
                <a href="../sensors/sensors.html" class="nav-link" title="Telemetry">
                    <i data-lucide="activity"></i>
                </a>
            </div>
        </nav>

        <!-- MAIN VIEWPORT -->
        <main class="workspace">
            <div class="map-workspace">
                <div class="map-main-area">
                    <div id="map-container"></div>
                    
                    <div class="map-hud-top">LIVE MISSION COORDINATES</div>

                    <div class="map-tools-right">
                        <button class="tool-btn-soft" id="btn-zoom-in"><i data-lucide="plus"></i></button>
                        <button class="tool-btn-soft" id="btn-zoom-out"><i data-lucide="minus"></i></button>
                        <button class="tool-btn-soft" id="btn-recenter"><i data-lucide="crosshair"></i></button>
                        <button class="tool-btn-soft"><i data-lucide="layers"></i></button>
                    </div>

                    <div class="map-footer-hud">
                        <div class="coord-group">
                            <div class="coord-data">
                                <span class="coord-label">Latitude</span>
                                <span class="coord-val" id="lat-display">0.000000°</span>
                            </div>
                            <div class="coord-data">
                                <span class="coord-label">Longitude</span>
                                <span class="coord-val" id="lng-display">0.000000°</span>
                            </div>
                            <div class="coord-data">
                                <span class="coord-label">Altitude</span>
                                <span class="coord-val" id="alt-display">-- m</span>
                            </div>
                        </div>
                        <div class="sat-badge">
                            <i data-lucide="satellite"></i>
                            <span>LINKED SATELLITES: <span id="sat-count">0</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script type="module" src="../shared/mqtt-client.js"></script>
    <script type="module" src="../shared/shared.js"></script>
    <script type="module" src="./map.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
