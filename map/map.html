<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Intel | Tactical GIS Map</title>
    <meta name="description" content="Live Leaflet-based GPS tracking and hazard geofencing dashboard for RescueBOT disaster command center.">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    
    <!-- Theme setup (runs immediately to prevent flash) -->
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('rescuebot-theme') || 'dark');
    </script>
    
    <!-- Stylesheets: Fallback links + Embedded self-contained styling -->
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./map.css">
    
    <!-- Leaflet JS & CSS CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ── EMBEDDED COMPACT DESIGN SYSTEM & LAYOUT OVERRIDES ──────────────── */
        :root {
            --bg-base: #090D17;
            --bg-deep: #0C1120;
            --bg-surface: #101624;
            --bg-card: #151C2C;
            --bg-elevated: #1A2236;
            --accent: #3B82F6;
            --accent-muted: rgba(59, 130, 246, 0.1);
            --border-subtle: rgba(255, 255, 255, 0.045);
            --border-default: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(59, 130, 246, 0.28);
            --text-primary: #EFF2F7;
            --text-secondary: #8E9BB5;
            --text-muted: #4B5570;
            --radius-sm: 5px;
            --radius-md: 7px;
            --radius-lg: 10px;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --shadow-md: 0 4px 14px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 28px rgba(0,0,0,0.6);
            --sidebar-w: 52px;
            --nav-h: 52px;
            
            /* Spacing & Transitions */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --t-fast: 150ms ease;
            --t-med: 220ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-base: #F5F7FA;
            --bg-deep: #EEF1F7;
            --bg-surface: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-elevated: #F0F4FA;
            --accent: #2563EB;
            --accent-muted: rgba(37, 99, 235, 0.07);
            --border-subtle: rgba(0, 0, 0, 0.05);
            --border-default: rgba(0, 0, 0, 0.09);
            --border-accent: rgba(37, 99, 235, 0.22);
            --text-primary: #0F172A;
            --text-secondary: #374151;
            --text-muted: #9CA3AF;
        }

        /* Full screen layout resets */
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        /* ── EMERGENCY ALERT RED FLASH OVERLAY ──────────────────────────────── */
        .emergency-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            box-shadow: inset 0 0 100px rgba(239, 68, 68, 0);
            transition: opacity 0.5s ease;
        }
        .emergency-overlay.active {
            opacity: 1;
            animation: pulseRedFlash 1.8s infinite;
        }
        @keyframes pulseRedFlash {
            0%, 100% { box-shadow: inset 0 0 80px rgba(239, 68, 68, 0.45); background: rgba(239, 68, 68, 0.03); }
            50% { box-shadow: inset 0 0 140px rgba(239, 68, 68, 0.7); background: rgba(239, 68, 68, 0.12); }
        }

        /* Flashing warning banner */
        .geofence-alert-banner {
            position: absolute;
            top: 66px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(239, 68, 68, 0.95);
            color: #ffffff;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 8px 24px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
            z-index: 99998;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }
        .geofence-alert-banner.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .geofence-alert-banner i {
            animation: pulseIcon 1s infinite alternate;
        }
        @keyframes pulseIcon {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }



        /* ── MAP LAYOUT STRUCTURE ───────────────────────────────────────────── */
        .map-shell {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #map-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ── FLOATING TACTICAL TOOLBAR (LEFT SIDEBAR HUD) ────────────────────── */
        .map-hud-overlay {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
        }
        .map-floating-tools {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            gap: 6px;
            pointer-events: auto;
            z-index: 1000;
        }
        .map-tool-divider {
            width: 1px;
            height: 20px;
            background: var(--border-subtle);
            align-self: center;
            margin: 0 4px;
            flex-shrink: 0;
        }

        /* ── TOOL STRIP BUTTONS ────────────────────────────────────────────── */
        .map-tool-btn {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(11, 15, 25, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--btn-color, var(--text-secondary));
            cursor: pointer;
            transition: var(--t-fast);
            flex-shrink: 0;
        }
        [data-theme="light"] .map-tool-btn {
            background: rgba(255, 255, 255, 0.94);
        }
        .map-tool-btn svg,
        .map-tool-btn i {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
        .map-tool-btn:hover {
            border-color: var(--btn-color, var(--border-accent));
            color: #0B0F19;
            background: var(--btn-color, var(--accent)) !important;
            box-shadow: 0 0 10px var(--btn-color);
        }
        .map-tool-btn.active {
            border-color: var(--btn-color, var(--border-accent)) !important;
            color: #0B0F19 !important;
            background: var(--btn-color, var(--accent)) !important;
            box-shadow: 0 0 14px var(--btn-color) !important;
        }

        /* ── CUSTOM TACTICAL TOOLTIPS ───────────────────────────────────────── */
        .map-tool-btn {
            position: relative;
        }
        .map-tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid var(--btn-color, var(--border-default));
            color: var(--text-primary);
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5), 0 0 4px var(--btn-color);
            z-index: 9999;
        }
        .map-tool-btn::before {
            content: '';
            position: absolute;
            top: calc(100% + 2px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            border-width: 5px;
            border-style: solid;
            border-color: transparent transparent var(--btn-color, var(--border-default)) transparent;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 9999;
        }
        .map-tool-btn:hover::after,
        .map-tool-btn:hover::before {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* ── HUD BOTTOM COORDINATES PANELS ───────────────────────────────────── */
        .map-hud-bottom {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: var(--space-3);
            pointer-events: auto;
        }
        .map-hud-card {
            background: rgba(11, 15, 25, 0.90);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 10px 16px;
            text-align: center;
            min-width: 90px;
            transition: border-color var(--t-fast);
            box-shadow: var(--shadow-sm);
        }
        [data-theme="light"] .map-hud-card {
            background: rgba(255, 255, 255, 0.94);
        }
        .map-hud-card:hover {
            border-color: var(--border-accent);
        }
        .hud-card-val {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1;
            white-space: nowrap;
        }
        .hud-card-lbl {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── RIGHT ZOOM & RECENTER CONTROLS ─────────────────────────────────── */
        .map-tools-right {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
            pointer-events: auto;
            z-index: 1000;
        }
        .map-zoom-btn {
            width: 34px;
            height: 34px;
            background: rgba(11, 15, 25, 0.88);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--btn-color, var(--text-secondary));
            transition: var(--t-fast);
        }
        [data-theme="light"] .map-zoom-btn {
            background: rgba(255, 255, 255, 0.94);
        }
        .map-zoom-btn svg,
        .map-zoom-btn i {
            width: 14px;
            height: 14px;
        }
        .map-zoom-btn:hover {
            border-color: var(--btn-color, var(--border-accent));
            color: #0B0F19;
            background: var(--btn-color, var(--accent)) !important;
            box-shadow: 0 0 10px var(--btn-color);
        }
        .map-zoom-btn.active {
            border-color: var(--btn-color, var(--border-accent));
            color: #0B0F19 !important;
            background: var(--btn-color, var(--accent)) !important;
            box-shadow: 0 0 14px var(--btn-color);
        }
        .map-zoom-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 2px 4px;
        }

        /* ── LEAFLET CUSTOM POPUPS OVERRIDES ────────────────────────────────── */
        .leaflet-popup-content-wrapper {
            background: #151C2C !important;
            color: #EFF2F7 !important;
            border: 1px solid rgba(59, 130, 246, 0.25) !important;
            border-radius: var(--radius-md) !important;
            box-shadow: var(--shadow-lg) !important;
            padding: 2px !important;
        }
        [data-theme="light"] .leaflet-popup-content-wrapper {
            background: #ffffff !important;
            color: #0F172A !important;
            border: 1px solid rgba(37, 99, 235, 0.15) !important;
        }
        .leaflet-popup-tip {
            background: #151C2C !important;
        }
        [data-theme="light"] .leaflet-popup-tip {
            background: #ffffff !important;
        }
        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            font-size: 14px !important;
            padding: 4px 8px !important;
        }
        .leaflet-popup-close-button:hover {
            color: var(--accent) !important;
        }

        /* ── COMPASS NEEDLE GLOW FOR ROVER ──────────────────────────────────── */
        @keyframes pulseCompass {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4), 0 0 10px rgba(0, 212, 255, 0.8); }
            50%       { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0), 0 0 18px rgba(0, 212, 255, 0.9); }
        }
        .rover-pulse-ring {
            width: 18px; height: 18px;
            background: #00D4FF;
            border-radius: 50%;
            border: 2.5px solid #ffffff;
            box-shadow: 0 0 10px rgba(0,212,255,0.8);
            animation: pulseCompass 2s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .rover-pulse-dot {
            width: 5px; height: 5px;
            background: #ffffff;
            border-radius: 50%;
        }
        .rover-compass-heading {
            position: absolute;
            top: -6px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 8px solid #00D4FF;
            z-index: 3;
            transition: transform 0.15s ease;
        }
        
        /* Mobile adjustment for HUD overlays */
        @media (max-width: 900px) {
            .map-floating-tools {
                max-width: calc(100vw - 32px);
                overflow-x: auto;
                white-space: nowrap;
                justify-content: flex-start;
                padding: 4px;
            }
        }
    </style>
</head>
<body>



<div class="app-shell">

    <!-- ══ SIDEBAR (LEFT) ══════════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">

        <nav class="sidebar-nav">

    <!-- ══ MAIN DASHBOARD COLUMN ══════════════════════════════════════════ -->
    <div class="main-column">

        <!-- TOP NAVBAR -->
        <header class="top-navbar">
            <div class="nav-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open navigation">
                    <i data-lucide="menu"></i>
                </button>
                <span class="nav-page-title">Incident Map</span>
            </div>
            <div class="nav-right">
                <div class="status-pill">
                    <div class="status-dot offline" id="gps-dot"></div>
                    <i data-lucide="satellite" id="gps-icon" style="width:12px;height:12px;color:#EF4444;margin-right:2px;"></i>
                    <span id="gps-status" style="font-family:var(--font-mono);font-size:10px;">Waiting for GPS...</span>
                </div>
                <div class="status-pill">
                    <i data-lucide="clock" style="width:10px;height:10px;"></i>
                    <span id="mission-clock" style="font-family:var(--font-mono);font-size:10px;">--:--:--</span>
                </div>
                <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <i data-lucide="moon"></i>
                </button>
            </div>
        </header>

        <!-- MAP CANVAS CONTAINER -->
        <div class="map-shell">

            <!-- ── INTERACTIVE MAP CANVAS (LEAFLET) ─────────────────────────── -->
            <div id="map-canvas"></div>

            <!-- ── FLOATING TACTICAL TOOLBAR (TOP MIDDLE) ──────────────── -->
            <div class="map-hud-overlay map-floating-tools">
                <button class="map-tool-btn active" id="btn-follow" style="--btn-color: #00D4FF;" data-tooltip="Follow Rover">
                    <i data-lucide="crosshair"></i>
                </button>
                <div class="map-tool-divider"></div>
                <button class="map-tool-btn" id="btn-safe" style="--btn-color: #00FF88;" data-tooltip="Safe Zone">

                </button>
                <button class="map-tool-btn" id="btn-danger" style="--btn-color: #FF2D55;" data-tooltip="Danger Zone">
                    <i data-lucide="alert-triangle"></i>
                </button>
                <button class="map-tool-btn" id="btn-base-station" style="--btn-color: #00D4FF;" data-tooltip="Base Station">
                    <i data-lucide="radio"></i>
                </button>
                <button class="map-tool-btn" id="btn-survivor" style="--btn-color: #FF007F;" data-tooltip="Survivor (SOS)">

                </button>

                <button class="map-tool-btn" id="btn-supplies" style="--btn-color: #A066FF;" data-tooltip="Supplies">
                    <i data-lucide="package"></i>
                </button>
                <button class="map-tool-btn" id="btn-fire" style="--btn-color: #FF5722;" data-tooltip="Fire Source">
                    <i data-lucide="flame"></i>

                <button class="map-tool-btn" id="btn-gas" style="--btn-color: #E040FB;" data-tooltip="Gas Hazard">

                </button>

                    <i data-lucide="droplet"></i>
                </button>
                <div class="map-tool-divider"></div>
                <button class="map-tool-btn" id="btn-clear-path" style="--btn-color: #8BA4C0;" data-tooltip="Clear Trail">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>

            <!-- ── HUD BOTTOM STATS CARDS (COORDINATES READOUTS) ─────────────── -->
            <div class="map-hud-overlay map-hud-bottom">

<script>
    // Core state management
    let map = null;
    let roverMarker = null;
    let isFollowing = true;
    let activeTool = null;
    
    let currentPos = null; // [lat, lng]
    let roverHeading = 0;
    
    // Breadcrumbs path
    let breadcrumbCoords = []; // [[lat, lng], [lat, lng], ...]
    let pathLine = null;
    let pathGlow = null;
    

    
    // Custom landmarks array
    let landmarks = [];
    
    // Mission Timer variables
    let missionSecs = 0;
    let missionInterval = null;

    // Tile Layers
    let osmLayer = null;
    let esriLayer = null;
    let activeLayerName = 'streets'; // 'streets' or 'satellite'
    

    // ── INITIALIZATION ───────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) window.lucide.createIcons();
        startMissionTimer();
        setupSidebarThemeEvents();
        initializeMap(); // Initialize Leaflet map directly, no keys/wizards needed
    });

    // ── INITIALIZE LEAFLET MAP ───────────────────────────────────────────────
    function initializeMap() {
        try {
            map = L.map('map-canvas', {
                zoomControl: false,
                attributionControl: false
            }).setView([20.5937, 78.9629], 16); // Center on Nagoya/India initially
            
            // Free standard OpenStreetMap vector tiles (requires no API keys)
            osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            });
            
            // Free Esri satellite imagery tiles (requires no API keys)
            esriLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            });
            
            // Add default base layer
            osmLayer.addTo(map);
            
            // Sync style switcher status on layer switch via native control (if added)
            map.on('baselayerchange', (e) => {
                if (e.layer === esriLayer) {
                    activeLayerName = 'satellite';
                    document.getElementById('btn-layers')?.classList.add('active');
                } else {
                    activeLayerName = 'streets';
                    document.getElementById('btn-layers')?.classList.remove('active');
                }
            });

            // Map Click listener for target display & landmarks placing
            map.on('click', (e) => {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                
                document.getElementById('target-lat-hud').textContent = lat.toFixed(5);
                document.getElementById('target-lng-hud').textContent = lng.toFixed(5);
                
                if (activeTool) {
                    addLandmark(lat, lng, activeTool);
                }
            });
            
            // Turn off follow mode if user starts dragging map
            map.on('dragstart', () => {
                if (isFollowing) {
                    isFollowing = false;
                    document.getElementById('btn-follow').classList.remove('active');
                    window.RESCUEBOT_UI?.toast('Camera follow deactivated', 'info');
                }
            });

            setupInteractiveHUDControls();
            setupMqttConnector();
            
        } catch (err) {
            console.error('Leaflet initialization failed:', err);
            alert('Error loading Leaflet. Check console logs.');
        }
    }


    // ── CORE FUNCTION: updateRoverLocation (lat, lng parameter order) ──
    window.updateRoverLocation = function(lat, lng) {
        // Rover GPS location has been updated



        currentPos = [lat, lng];
        
        // Update Bottom Coordinates display
        document.getElementById('lat-hud').textContent = lat.toFixed(5);
        document.getElementById('lng-hud').textContent = lng.toFixed(5);
        
        // Append path coordinate to breadcrumbs
        breadcrumbCoords.push(currentPos);
        if (breadcrumbCoords.length > 1000) {
            breadcrumbCoords.shift();
        }


        // Update breadcrumb trails on the Leaflet map
        if (!pathLine) {
            pathGlow = L.polyline(breadcrumbCoords, {
                color: '#00D4FF',
                weight: 8,
                opacity: 0.25,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);

            pathLine = L.polyline(breadcrumbCoords, {
                color: '#00D4FF',
                weight: 3.5,
                opacity: 0.95,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);
        } else {
            pathLine.setLatLngs(breadcrumbCoords);
            pathGlow.setLatLngs(breadcrumbCoords);
        }
        
        // Create or move Marker
        if (!roverMarker) {
            const roverIconHtml = `
                <div class="rover-custom-marker">
                    <div class="rover-pulse-ring">
                        <div class="rover-pulse-dot"></div>
                    </div>
                    <div class="rover-compass-heading" id="heading-needle"></div>
                </div>
            `;
            const roverIcon = L.divIcon({
                html: roverIconHtml,
                className: '',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
            
            roverMarker = L.marker(currentPos, { icon: roverIcon, zIndexOffset: 1000 }).addTo(map);
            map.setView(currentPos, 18);
        } else {
            roverMarker.setLatLng(currentPos);
        }
        
        // Rotate heading needle directly
        const needle = document.getElementById('heading-needle');
        if (needle) {
            needle.style.transform = `translateX(-50%) rotate(${roverHeading}deg)`;
        }
        
        // Optionally auto-pan to new coordinates if follow camera toggled
        if (isFollowing) {
            map.panTo(currentPos, { animate: true, duration: 0.8 });
        }
    }

    // ── GPS SATELLITE/VECTOR LAYERS QUICK TOGGLE BUTTON ───────────────────
    function toggleMapStyle() {
        if (!map) return;
        
        const btn = document.getElementById('btn-layers');
        if (activeLayerName === 'streets') {
            if (map.hasLayer(osmLayer)) map.removeLayer(osmLayer);
            if (!map.hasLayer(esriLayer)) esriLayer.addTo(map);
            activeLayerName = 'satellite';
            if (btn) btn.classList.add('active');
            window.RESCUEBOT_UI?.toast('Switched to Satellite Map', 'success');
        } else {
            if (map.hasLayer(esriLayer)) map.removeLayer(esriLayer);
            if (!map.hasLayer(osmLayer)) osmLayer.addTo(map);
            activeLayerName = 'streets';
            if (btn) btn.classList.remove('active');
            window.RESCUEBOT_UI?.toast('Switched to Vector Map', 'success');
        }
    }

    // ── PLACING LANDMARKS (Custom Markers) ───────────────────────────────
    function addLandmark(lat, lng, type) {
        const LANDMARK_CONFIG = {
            safe:        { color: '#00FF88', label: 'Safe Zone',    emoji: '🛡️' },
            danger:      { color: '#FF2D55', label: 'Danger Zone',  emoji: '⚠️' },
            basestation: { color: '#00D4FF', label: 'Base Station', emoji: '📡' },
            survivor:    { color: '#FF007F', label: 'Survivor SOS', emoji: '🆘' },
            obstacle:    { color: '#FFB800', label: 'Obstacle',     emoji: '🚧' },
            supplies:    { color: '#A066FF', label: 'Supplies',     emoji: '📦' },
            fire:        { color: '#FF5722', label: 'Fire Source',  emoji: '🔥' },
            gas:         { color: '#E040FB', label: 'Gas Hazard',   emoji: '💀' },
            water:       { color: '#2196F3', label: 'Water Hazard', emoji: '💧' },
        };
        
        const cfg = LANDMARK_CONFIG[type];
        if (!cfg) return;

        const idx = landmarks.length + 1;
        const name = `${cfg.label} #${idx}`;

        const markerHtml = `
            <div style="
                width:24px; height:24px;
                background:${cfg.color};
                border-radius:50% 50% 50% 0;
                transform:rotate(-45deg);
                border:2px solid rgba(255,255,255,0.7);
                box-shadow:0 0 10px ${cfg.color}80;
                display:flex; align-items:center; justify-content:center;
            ">
                <span style="transform:rotate(45deg); font-size:10px; line-height:1;">${cfg.emoji}</span>
            </div>
        `;

        const icon = L.divIcon({
            html: markerHtml,
            className: '',
            iconSize: [24, 24],
            iconAnchor: [12, 24],
        });

        const popupContent = `
            <div style="font-family:'Inter',sans-serif; color:#EFF2F7; background:#151C2C; padding:4px 8px; border-radius:6px;">
                <strong style="color:${cfg.color}; display:flex; align-items:center; gap:4px;">
                    <span>${cfg.emoji}</span> ${name}
                </strong>
                <div style="font-family:'JetBrains Mono',monospace; font-size:9px; color:#8E9BB5; margin-top:2px;">
                    ${lat.toFixed(6)}°, ${lng.toFixed(6)}°
                </div>
            </div>
        `;

        const marker = L.marker([lat, lng], { icon })
            .addTo(map)
            .bindPopup(popupContent, {
                className: 'rescuebot-popup'
            });

        landmarks.push({ lat, lng, type, name, marker, color: cfg.color });

        // Reset placing tools button active states
        const toolBtnIds = {
            safe: 'btn-safe', danger: 'btn-danger', basestation: 'btn-base-station',
            survivor: 'btn-survivor', obstacle: 'btn-obstacle', supplies: 'btn-supplies',
            fire: 'btn-fire', gas: 'btn-gas', water: 'btn-water'
        };
        const activeBtnId = toolBtnIds[activeTool];
        if (activeBtnId) {
            document.getElementById(activeBtnId)?.classList.remove('active');
        }
        activeTool = null;
        document.getElementById('map-canvas').style.cursor = '';
        
        window.RESCUEBOT_UI?.toast(`${name} deployed`, 'success');
    }

    // ── SETUP MAP OVERLAY / ZOOM / HOVER HANDLERS ─────────────────────────
    function setupInteractiveHUDControls() {
        // Zoom triggers
        document.getElementById('btn-zoom-in')?.addEventListener('click', () => {
            if (map) map.zoomIn();
        });
        document.getElementById('btn-zoom-out')?.addEventListener('click', () => {
            if (map) map.zoomOut();
        });
        
        // Recenter click
        document.getElementById('btn-recenter')?.addEventListener('click', () => {
            if (currentPos) {
                isFollowing = true;
                document.getElementById('btn-follow').classList.add('active');
                if (map) {
                    map.setView(currentPos, 18, { animate: true });
                }
                window.RESCUEBOT_UI?.toast('Recentered & camera follow active', 'success');
            } else {
                window.RESCUEBOT_UI?.toast('Waiting for GPS lock coordinates...', 'warning');
            }
        });

        // Follow Toggle
        document.getElementById('btn-follow')?.addEventListener('click', () => {
            isFollowing = !isFollowing;
            document.getElementById('btn-follow').classList.toggle('active', isFollowing);
            if (isFollowing && currentPos) {
                if (map) map.panTo(currentPos);
            }
            window.RESCUEBOT_UI?.toast(isFollowing ? 'Follow camera enabled' : 'Follow camera disabled', isFollowing ? 'success' : 'info');
        });

        // Clear Path
        document.getElementById('btn-clear-path')?.addEventListener('click', () => {
            breadcrumbCoords = [];
            if (currentPos) {
                breadcrumbCoords.push(currentPos);
            }
            if (pathLine) {
                pathLine.setLatLngs(breadcrumbCoords);
                pathGlow.setLatLngs(breadcrumbCoords);
            }
            window.RESCUEBOT_UI?.toast('Rover breadcrumb trail cleared', 'info');
        });

        // Layers toggle click
        document.getElementById('btn-layers')?.addEventListener('click', toggleMapStyle);

        // Toggle placing tools active state
        const tacticalTools = [
            { id: 'btn-safe',            tool: 'safe' },
            { id: 'btn-danger',          tool: 'danger' },
            { id: 'btn-base-station',    tool: 'basestation' },
            { id: 'btn-survivor',        tool: 'survivor' },
            { id: 'btn-obstacle',        tool: 'obstacle' },
            { id: 'btn-supplies',        tool: 'supplies' },
            { id: 'btn-fire',            tool: 'fire' },
            { id: 'btn-gas',             tool: 'gas' },
            { id: 'btn-water',           tool: 'water' }
        ];

        tacticalTools.forEach(({ id, tool }) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            
            btn.addEventListener('click', () => {
                if (activeTool === tool) {
                    activeTool = null;
                    btn.classList.remove('active');
                    document.getElementById('map-canvas').style.cursor = '';
                } else {
                    tacticalTools.forEach(b => document.getElementById(b.id)?.classList.remove('active'));
                    activeTool = tool;
                    btn.classList.add('active');
                    document.getElementById('map-canvas').style.cursor = 'crosshair';
                    window.RESCUEBOT_UI?.toast(`Active placing tool: ${tool.toUpperCase()}. Click on map.`, 'info');
                }
            });
        });
    }

    // ── SETUP MQTT CONNECTOR ───────────────────────────────────────────────
    function setupMqttConnector() {
        const mqttCtrl = window.mqttController;
        if (mqttCtrl) {
            // Subscribing to telemetry data streams
            mqttCtrl.on('telemetry', (d) => {
                if (d && d.sensor === 'gps' && d.value) {
                    const lat = parseFloat(d.value.lat);
                    const lng = parseFloat(d.value.lng);
                    roverHeading = parseFloat(d.value.heading) || 0;
                    
                    if (!isNaN(lat) && !isNaN(lng)) {
                        updateRoverLocation(lat, lng); // Latitude first parameter order
                    }
                }
            });

            mqttCtrl.on('statusChanged', (status) => {
                const dot = document.getElementById('mqtt-dot');
                if (dot) {
                    dot.className = 'status-dot mqtt-status-dot ' + status.toLowerCase();
                }
                
                const gpsDot = document.getElementById('gps-dot');
                const gpsTxt = document.getElementById('gps-status');
                if (gpsDot && gpsTxt) {
                    if (status === 'CONNECTED') {
                        gpsDot.className = 'status-dot';
                        gpsTxt.textContent = '3D GPS FIX';
                    } else if (status === 'CONNECTING') {
                        gpsDot.className = 'status-dot warning';
                        gpsTxt.textContent = 'ACQUIRING...';
                    } else {
                        gpsDot.className = 'status-dot offline';
                        gpsTxt.textContent = 'GPS OFFLINE';
                    }
                }
            });
        }
    }

    // ── HELPER: DEFAULTS & MISSION CLOCKS ──────────────────────────────────
    function startMissionTimer() {
        missionSecs = 0;
        missionInterval = setInterval(() => {
            missionSecs++;
            const h = String(Math.floor(missionSecs / 3600)).padStart(2, '0');
            const m = String(Math.floor((missionSecs % 3600) / 60)).padStart(2, '0');
            const s = String(missionSecs % 60).padStart(2, '0');
            
            const timerHUD = document.getElementById('mission-timer-hud');
            if (timerHUD) timerHUD.textContent = `${h}:${m}:${s}`;
        }, 1000);
    }
    
    function setupSidebarThemeEvents() {
        // Clock ticking
        const clockEl = document.getElementById('mission-clock');
        if (clockEl) {
            const tick = () => {
                clockEl.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
            };
            setInterval(tick, 1000);
            tick();
        }
        
        // Mobile sidebar trigger
        const sidebarEl = document.getElementById('sidebar');
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const backdrop  = document.getElementById('sidebar-backdrop');
        
        if (sidebarEl && mobileBtn && backdrop) {
            mobileBtn.addEventListener('click', () => {
                sidebarEl.classList.add('mobile-open');
                backdrop.classList.add('visible');
            });
            backdrop.addEventListener('click', () => {
                sidebarEl.classList.remove('mobile-open');
                backdrop.classList.remove('visible');
            });
        }
        
        // Theme button click toggler
        const themeBtn = document.getElementById('theme-toggle');
        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('rescuebot-theme', 'dark');
            });
        }
    }
</script>
