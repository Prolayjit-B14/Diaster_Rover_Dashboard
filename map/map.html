<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Tactical GPS Mapping</title>
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./map.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-frame">
        <!-- TOP NAVBAR -->
        <nav class="top-navbar">
            <div class="nav-left">
                <div class="logo-box">R</div>
                <h1 class="nav-title">RescueBOT <span class="nav-divider">/</span> <span class="nav-page">TACTICAL MAP</span></h1>
            </div>

            <div class="nav-center">
                <div class="status-capsule">
                    <div class="status-dot disconnected" id="mqtt-dot"></div>
                    <span id="mqtt-status-text">SYSTEM OFFLINE</span>
                </div>
                <div class="status-capsule mono">
                    <i data-lucide="clock" style="width: 14px; color: var(--primary);"></i>
                    <span id="current-time">00:00:00</span>
                </div>
            </div>

            <div class="nav-right">
                <a href="../dashboard/dashboard.html" class="nav-item" title="Dashboard">
                    <i data-lucide="layout-grid" class="nav-icon"></i>
                </a>
                <a href="../map/map.html" class="nav-item active" title="Map">
                    <i data-lucide="map" class="nav-icon"></i>
                </a>
                <a href="../camera/camera.html" class="nav-item" title="Camera">
                    <i data-lucide="camera" class="nav-icon"></i>
                </a>
                <a href="../sensors/sensors.html" class="nav-item" title="Sensors">
                    <i data-lucide="activity" class="nav-icon"></i>
                </a>
            </div>
        </nav>

        <!-- MAIN VIEWPORT -->
        <main class="workspace">
            <div class="map-layout">
                <div class="map-main">
                    <div id="map-container"></div>
                    
                    <!-- OVERLAY CONTROLS -->
                    <div class="map-controls-overlay">
                        <button class="map-control-btn" id="btn-zoom-in"><i data-lucide="plus"></i></button>
                        <button class="map-control-btn" id="btn-zoom-out"><i data-lucide="minus"></i></button>
                        <button class="map-control-btn" id="btn-recenter"><i data-lucide="crosshair"></i></button>
                        <button class="map-control-btn" id="btn-layers"><i data-lucide="layers"></i></button>
                    </div>

                    <!-- GPS INFO BAR -->
                    <div class="glass-card gps-info-bar stagger-2">
                        <div class="coords-display">
                            <div class="coord-item">
                                <span class="coord-label">Latitude</span>
                                <span class="coord-val" id="lat-display">0.000000°</span>
                            </div>
                            <div class="coord-item">
                                <span class="coord-label">Longitude</span>
                                <span class="coord-val" id="lng-display">0.000000°</span>
                            </div>
                            <div class="coord-item">
                                <span class="coord-label">Altitude</span>
                                <span class="coord-val" id="alt-display">-- m</span>
                            </div>
                        </div>
                        <div class="sat-status">
                            <i data-lucide="satellite" style="color: var(--primary);"></i>
                            <span>SATELLITES: <span class="sat-count" id="sat-count">0</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script type="module" src="../shared/mqtt-client.js"></script>
    <script type="module" src="../shared/shared.js"></script>
    <script type="module" src="./map.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
