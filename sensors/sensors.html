<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Health Telemetry</title>
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="./sensors.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-frame">
        <nav class="top-navbar">
            <div class="nav-left">
                <div class="logo-box">R</div>
                <div class="nav-title-group">
                    <span class="nav-title">RescueBOT Support</span>
                    <span class="nav-subtitle">Environment Safety</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="status-pill">
                    <div class="status-dot active" id="mqtt-dot"></div>
                    <span id="mqtt-status-text">NETWORK SECURE</span>
                </div>
            </div>

            <div class="nav-right">
                <button id="theme-toggle" class="btn-standard" title="Toggle Theme"><i data-lucide="sun"></i></button>
                <a href="../dashboard/dashboard.html" class="nav-link" title="Dashboard"><i data-lucide="layout-grid"></i></a>
                <a href="../map/map.html" class="nav-link" title="Map"><i data-lucide="map"></i></a>
                <a href="../camera/camera.html" class="nav-link" title="Vision"><i data-lucide="video"></i></a>
                <a href="../sensors/sensors.html" class="nav-link active" title="Telemetry"><i data-lucide="activity"></i></a>
            </div>
        </nav>

        <main class="workspace">
            <div class="sensors-view">
                <header class="dash-header">
                    <div class="header-content">
                        <h1>Safety Diagnostics</h1>
                        <p>High-precision telemetry monitoring for first responders.</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-standard primary"><i data-lucide="download"></i> Export Data</button>
                    </div>
                </header>

                <div class="sensor-monitor-grid">
                    <div class="card-standard monitor-card-standard">
                        <div class="monitor-header">
                            <div class="monitor-label">
                                <div class="monitor-icon-box"><i data-lucide="thermometer"></i></div>
                                <div class="monitor-title-group">
                                    <span class="monitor-sub">Node 01</span>
                                    <span class="monitor-name">Ambient Temperature</span>
                                </div>
                            </div>
                            <i data-lucide="check-circle" style="color: var(--success); width: 20px;"></i>
                        </div>
                        <div class="monitor-reading">
                            <span class="reading-val" id="val-temp">--.-</span>
                            <span class="reading-unit">Celsius</span>
                        </div>
                        <div class="monitor-footer">
                            <span>LIMIT: 45.0°C</span>
                            <span>STATUS: NOMINAL</span>
                        </div>
                    </div>

                    <div class="card-standard monitor-card-standard" style="border-top-color: var(--accent-amber);">
                        <div class="monitor-header">
                            <div class="monitor-label">
                                <div class="monitor-icon-box"><i data-lucide="wind"></i></div>
                                <div class="monitor-title-group">
                                    <span class="monitor-sub">Node 02</span>
                                    <span class="monitor-name">Atmospheric Gas</span>
                                </div>
                            </div>
                            <i data-lucide="shield-check" style="color: var(--primary); width: 20px;"></i>
                        </div>
                        <div class="monitor-reading">
                            <span class="reading-val" id="val-gas">---</span>
                            <span class="reading-unit">ppm</span>
                        </div>
                        <div class="monitor-footer">
                            <span>LIMIT: 400 PPM</span>
                            <span>STATUS: SECURE</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script type="module" src="../shared/mqtt-client.js"></script>
    <script type="module" src="../shared/shared.js"></script>
    <script type="module" src="./sensors.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
