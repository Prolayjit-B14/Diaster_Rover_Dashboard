<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Mission Control System</title>
    <link rel="stylesheet" href="./shared/shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #231b18 0%, #14100e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #f8fafc;
        }

        .init-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-large {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2.5rem;
            font-weight: 800;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(37, 99, 235, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(37, 99, 235, 0.6); }
        }

        .system-name {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.5s ease;
        }

        .loading-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #64748b;
            height: 20px;
        }

        .enter-btn {
            display: none;
            margin-top: 20px;
            padding: 12px 32px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
            filter: brightness(1.1);
        }

        .enter-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="init-container">
        <div class="logo-large">R</div>
        <h1 class="system-name">RescueBOT MISSION CONTROL</h1>
        <p class="system-status">System Initialization</p>
        
        <div class="loading-bar">
            <div class="loading-progress" id="progress"></div>
        </div>
        <p class="loading-text" id="status-text">Synchronizing telemetry...</p>

        <a href="./dashboard/dashboard.html" class="enter-btn" id="enter-btn">ENTER MISSION CONTROL</a>
    </div>

    <script>
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const enterBtn = document.getElementById('enter-btn');
        
        const steps = [
            "Authenticating credentials...",
            "Connecting to MQTT broker...",
            "Initializing neural engine...",
            "Loading geospatial data...",
            "Verifying sensor arrays...",
            "Establishing live feed...",
            "SYSTEM READY"
        ];

        let currentStep = 0;
        const interval = setInterval(() => {
            if (currentStep < steps.length) {
                statusText.innerText = steps[currentStep];
                progress.style.width = ((currentStep + 1) / steps.length * 100) + '%';
                currentStep++;
            } else {
                clearInterval(interval);
                statusText.style.color = '#10b981';
                enterBtn.style.display = 'inline-block';
                
                // Auto redirect after a short delay
                setTimeout(() => {
                    window.location.href = './dashboard/dashboard.html';
                }, 1500);
            }
        }, 400);

        lucide.createIcons();
    </script>
</body>
</html>
