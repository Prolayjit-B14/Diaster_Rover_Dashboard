<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueBOT | Emergency Response Support</title>
    <link rel="stylesheet" href="./shared/shared.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #334155;
        }

        .init-container {
            text-align: center;
            max-width: 500px;
            padding: 48px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(30, 58, 95, 0.1);
            border: 1px solid #E5E7EB;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box-large {
            width: 72px;
            height: 72px;
            background: #E67E22;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: white;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(230, 126, 34, 0.2);
        }

        .system-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #1E3A5F;
            margin-bottom: 8px;
        }

        .system-subtitle {
            font-size: 0.95rem;
            color: #64748B;
            margin-bottom: 40px;
        }

        .progress-wrapper {
            width: 100%;
            height: 8px;
            background: #F1F5F9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #3B82B6;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .enter-btn {
            display: none;
            margin-top: 32px;
            padding: 14px 40px;
            background: #1E3A5F;
            color: white;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 58, 95, 0.2);
        }

        .enter-btn:hover {
            background: #3B82B6;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 182, 0.3);
        }
    </style>
</head>
<body>
    <div class="init-container">
        <div class="logo-box-large">R</div>
        <h1 class="system-title">RescueBOT Support</h1>
        <p class="system-subtitle">Humanitarian Coordination & Emergency Response</p>
        
        <div class="progress-wrapper">
            <div class="progress-bar" id="progress"></div>
        </div>
        <p class="status-text" id="status-text">Connecting to field sensors...</p>

        <a href="./dashboard/dashboard.html" class="enter-btn" id="enter-btn">LAUNCH COORDINATION CENTER</a>
    </div>

    <script>
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const enterBtn = document.getElementById('enter-btn');
        
        const steps = [
            "Syncing mission data...",
            "Establishing satellite link...",
            "Authenticating responders...",
            "Initializing tactical map...",
            "Connecting to medical nodes...",
            "SYSTEM READY"
        ];

        let currentStep = 0;
        const interval = setInterval(() => {
            if (currentStep < steps.length) {
                statusText.innerText = steps[currentStep];
                progress.style.width = ((currentStep + 1) / steps.length * 100) + '%';
                currentStep++;
            } else {
                clearInterval(interval);
                statusText.style.color = '#4CAF50';
                enterBtn.style.display = 'inline-block';
                
                setTimeout(() => {
                    window.location.href = './dashboard/dashboard.html';
                }, 1200);
            }
        }, 500);

        lucide.createIcons();
    </script>
</body>
</html>
